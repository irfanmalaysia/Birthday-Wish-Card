<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday, Bella 🤍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}

  @keyframes floatUp{0%{transform:translateY(20px) rotate(0);opacity:0}10%{opacity:.9}100%{transform:translateY(-120vh) rotate(40deg);opacity:0}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes pop{0%{transform:scale(.86)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  @keyframes wiggle{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}

  .bg{position:fixed;inset:0;background:linear-gradient(180deg,#eaf1fb 0%,#dde7f7 100%);font-family:'Quicksand',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden}

  .heart{position:absolute;bottom:-40px;pointer-events:none;animation-timing-function:linear;animation-iteration-count:infinite;animation-name:floatUp;z-index:0}

  .stage{position:relative;width:100%;max-width:430px;height:100%;max-height:920px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;text-align:center;z-index:2}
  #screenHost{display:contents}

  .music-btn{position:absolute;top:22px;right:22px;width:46px;height:46px;border-radius:50%;border:2px solid #2a4fb0;background:rgba(255,255,255,.7);color:#2a4fb0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);z-index:5}
  .music-btn.playing span{display:inline-block;animation:wiggle .6s ease-in-out infinite}

  .screen{animation:pop .5s ease both;display:flex;flex-direction:column;align-items:center}
  .screen-greeting{gap:8px}
  .screen-ready{gap:10px}
  .screen-noo{gap:12px}
  .screen-password{width:100%}
  .screen-reveal{gap:10px}
  .screen-love{gap:10px}
  .screen-intro{gap:16px}
  .screen-memory{gap:20px;width:100%}
  .screen-final{animation:pop .6s ease both;gap:16px;max-height:100%;overflow-y:auto;padding:16px 4px;-webkit-overflow-scrolling:touch}
  .screen-final>*{flex:none}

  .cat-box{display:flex;align-items:center;justify-content:center}
  .cat-box svg{width:100%;height:100%;overflow:visible}
  .cat-bob-32{animation:bob 3.2s ease-in-out infinite}
  .cat-bob-30{animation:bob 3s ease-in-out infinite}
  .cat-shake{animation:shake .5s ease-in-out infinite}

  .h1{font-size:26px;font-weight:700;color:#2a4fb0;letter-spacing:.5px}
  .h1b{font-size:26px;font-weight:700;color:#2a4fb0;margin-top:4px}
  .q-ready{font-size:23px;font-weight:700;color:#2a4fb0;line-height:1.4;max-width:300px}
  .q-noo{font-size:21px;font-weight:700;color:#2a4fb0;line-height:1.4;max-width:310px;text-transform:uppercase}
  .q-pw{font-size:18px;font-weight:700;color:#2a4fb0;line-height:1.4;max-width:300px}
  .q-reveal{font-size:22px;font-weight:700;color:#2a4fb0;line-height:1.45;max-width:320px}
  .q-love{font-size:21px;font-weight:700;color:#2a4fb0;line-height:1.45;max-width:330px}
  .sub-love{font-size:15px;color:#6a82b8;font-weight:500}
  .q-intro{font-size:19px;font-weight:700;color:#2a4fb0;line-height:1.5;max-width:320px}
  .caption{font-size:19px;font-weight:700;color:#2a4fb0;line-height:1.5;max-width:330px}
  .final-title{font-size:26px;font-weight:700;color:#2a4fb0;line-height:1.35}
  .letter{font-size:15.5px;color:#5a72ac;font-weight:500;line-height:1.85;max-width:340px;white-space:pre-line;text-align:left}
  .signoff{font-size:15px;color:#2a4fb0;font-weight:700}
  .clue{margin-top:26px;font-size:13px;color:#7d93bf;font-weight:500;font-style:italic}

  .btn{border:none;border-radius:30px;background:#1e3a8a;color:#fff;font-family:inherit;font-weight:600;cursor:pointer;box-shadow:0 8px 18px rgba(30,58,138,.28)}
  .btn-outline{border:2px solid #1e3a8a;border-radius:30px;background:transparent;color:#1e3a8a;font-family:inherit;font-weight:600;cursor:pointer}
  .btn-round{width:54px;height:54px;border-radius:50%;font-size:22px;padding:0;display:flex;align-items:center;justify-content:center}
  .btn-row{display:flex;gap:14px;margin-top:14px}

  .dots{display:flex;gap:13px;margin:22px 0 26px}
  .dots.wrong{animation:shake .5s ease}
  .dot{width:14px;height:14px;border-radius:50%;border:2px solid #2a4fb0;background:transparent}
  .dot.filled{background:#2a4fb0}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:300px}
  .key{height:62px;border:none;border-radius:18px;background:#eef3fb;color:#1e3a8a;font-family:inherit;font-size:23px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 #d3deef}
  .key.blank{visibility:hidden;background:transparent;box-shadow:none;cursor:default}

  .polaroid{background:#fff;padding:12px 12px 18px;border-radius:6px;box-shadow:0 12px 30px rgba(40,60,110,.18);transform:rotate(-1.5deg)}
  .polaroid img{display:block;width:248px;height:310px;object-fit:cover}
</style>
</head>
<body>
<div class="bg">
  <div class="heart" style="left:8%;font-size:20px;animation-duration:9s;animation-delay:0s">🤍</div>
  <div class="heart" style="left:22%;font-size:14px;animation-duration:11s;animation-delay:2s">💙</div>
  <div class="heart" style="left:40%;font-size:18px;animation-duration:8s;animation-delay:4s">🤍</div>
  <div class="heart" style="left:58%;font-size:13px;animation-duration:12s;animation-delay:1s">💙</div>
  <div class="heart" style="left:74%;font-size:22px;animation-duration:10s;animation-delay:3s">🤍</div>
  <div class="heart" style="left:88%;font-size:15px;animation-duration:9.5s;animation-delay:5s">💙</div>

  <div class="stage">
    <button class="music-btn" id="musicBtn" title="music" aria-label="toggle music"><span id="noteIcon">♬</span></button>
    <div id="screenHost"></div>
  </div>
</div>

      <rect x="36" y="54" width="128" height="100" rx="48" fill="#74cce0" stroke="#173a5e" stroke-width="6"/>\
      <ellipse cx="58" cy="118" rx="13" ry="9" fill="#f4a6c0" opacity=".85"/>\
      <ellipse cx="142" cy="118" rx="13" ry="9" fill="#f4a6c0" opacity=".85"/>\
      <path d="M58 104 Q70 88 82 104" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/>\
      <path d="M118 104 Q130 88 142 104" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/>\
      <path d="M84 116 Q100 142 116 116 Z" fill="#b3406a" stroke="#173a5e" stroke-width="5" stroke-linejoin="round"/>\
      <path d="M96 128 Q100 140 104 128 Z" fill="#ff8fb0"/>\
    </svg>',
    love: '<svg viewBox="0 0 200 190" fill="none">\
      <path d="M30 40 q4 -8 8 0 q4 -8 8 0 q0 8 -8 14 q-8 -6 -8 -14 Z" fill="#ff6b9d"/>\
      <path d="M156 30 q4 -8 8 0 q4 -8 8 0 q0 8 -8 14 q-8 -6 -8 -14 Z" fill="#ff6b9d"/>\
      <path d="M64 56 L50 22 Q74 30 88 48 Z" fill="#74cce0" stroke="#173a5e" stroke-width="6" stroke-linejoin="round"/>\
      <path d="M136 56 L150 22 Q126 30 112 48 Z" fill="#74cce0" stroke="#173a5e" stroke-width="6" stroke-linejoin="round"/>\
      <path d="M70 44 L62 28 Q74 32 82 43 Z" fill="#f4a6c0"/>\
      <path d="M130 44 L138 28 Q126 32 118 43 Z" fill="#f4a6c0"/>\
      <rect x="36" y="52" width="128" height="100" rx="48" fill="#74cce0" stroke="#173a5e" stroke-width="6"/>\
      <ellipse cx="58" cy="118" rx="13" ry="9" fill="#f4a6c0" opacity=".85"/>\
      <ellipse cx="142" cy="118" rx="13" ry="9" fill="#f4a6c0" opacity=".85"/>\
      <path d="M58 104 Q70 88 82 104" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/>\
      <path d="M118 104 Q130 88 142 104" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/>\
      <path d="M88 116 q6 -8 12 0 q6 -8 12 0 q0 9 -12 16 q-12 -7 -12 -16 Z" fill="#ff6b9d" stroke="#173a5e" stroke-width="3" stroke-linejoin="round"/>\
    </svg>'
  };

  function cat(expr, w, h, animClass, extraStyle){
    return '<div class="cat-box ' + (animClass || '') + '" style="width:' + w + 'px;height:' + h + 'px' + (extraStyle || '') + '">' + CATS[expr] + '</div>';
  }

  function escapeHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var host = document.getElementById('screenHost');

  function screenGreeting(){
    return '<div class="screen screen-greeting">' +
      '<div class="h1">Hi</div>' +
      cat('teary', 230, 215, 'cat-bob-32') +
      '<div class="h1b">hi, pretty 🫶</div>' +
      '<button class="btn" id="btnNext" style="margin-top:22px;padding:13px 30px;font-size:16px">tap here &lt;3</button>' +
    '</div>';
  }

  function screenReady(){
    return '<div class="screen screen-ready">' +
      cat('excited', 230, 215, 'cat-bob-32') +
      '<div class="q-ready">are you readyy to open thisss?</div>' +
      '<div class="btn-row">' +
        '<button class="btn" id="btnYes" style="padding:12px 34px;font-size:16px">yess</button>' +
        '<button class="btn-outline" id="btnNoo" style="padding:12px 34px;font-size:16px">noo</button>' +
      '</div>' +
    '</div>';
  }

  function screenNoo(){
    return '<div class="screen screen-noo">' +
      cat('angry', 230, 215, 'cat-shake') +
      '<div class="q-noo">oh so now you don\'t wanna be with me? 🥺</div>' +
      '<button class="btn" id="btnBack" style="margin-top:8px;padding:12px 36px;font-size:16px">back</button>' +
    '</div>';
  }

  function screenPassword(){
    var dotsHtml = '';
    for (var i = 0; i < 6; i++){
      dotsHtml += '<div class="dot' + (i < state.pin.length ? ' filled' : '') + '"></div>';
    }
    var keys = ['1','2','3','4','5','6','7','8','9','','0','del'];
    var keysHtml = keys.map(function(k){
      if (k === '') return '<button class="key blank" tabindex="-1" disabled></button>';
      var label = k === 'del' ? '⌫' : k;
      return '<button class="key" data-k="' + k + '">' + label + '</button>';
    }).join('');
    return '<div class="screen screen-password">' +
      cat('teary', 150, 140, '', ';margin-bottom:4px') +
      '<div class="q-pw">Hi love, guess the password, I bet u know!! 😋</div>' +
      '<div class="dots' + (state.wrong ? ' wrong' : '') + '">' + dotsHtml + '</div>' +
      '<div class="keypad">' + keysHtml + '</div>' +
      '<div class="clue">clue : your birthday 🎂</div>' +
    '</div>';
  }

  function screenReveal(){
    return '<div class="screen screen-reveal">' +
      cat('party', 230, 215, 'cat-bob-30') +
      '<div class="q-reveal">Today, this pretty girl turns ' + CONFIG.age + '!<br>happy birthday, my love 🤍</div>' +
      '<button class="btn" id="btnNext" style="margin-top:16px;padding:13px 34px;font-size:16px">open it &lt;3</button>' +
    '</div>';
  }

  function screenLove(){
    return '<div class="screen screen-love">' +
      cat('love', 230, 215, 'cat-bob-30') +
      '<div class="q-love">Happy birthday to my most beautiful, loving, and caring girl 🤍</div>' +
      '<div class="sub-love">I love youu so muchh!!!</div>' +
      '<button class="btn" id="btnNext" style="margin-top:16px;padding:13px 28px;font-size:15px">i have something for you 💌</button>' +
    '</div>';
  }

  function screenIntro(){
    return '<div class="screen screen-intro">' +
      cat('party', 200, 188, 'cat-bob-30') +
      '<div class="q-intro">okayy last one, I made something for your birthday, read it slowly okayy</div>' +
      '<button class="btn btn-round" id="btnNext" style="margin-top:6px">→</button>' +
    '</div>';
  }

  function screenMemory(idx){
    var m = CONFIG.memories[idx];
    return '<div class="screen screen-memory">' +
      '<div class="polaroid">' +
        '<img src="' + m.src + '" alt="' + escapeHtml(m.caption) + '">' +
      '</div>' +
      '<div class="caption">' + escapeHtml(m.caption) + '</div>' +
      '<button class="btn" id="btnNext" style="padding:11px 30px;font-size:15px">klik ini &lt;3</button>' +
    '</div>';
  }

  function screenFinal(){
    return '<div class="screen screen-final">' +
      cat('love', 160, 150, 'cat-bob-30') +
      '<div class="final-title">Happy Birthday,<br>' + escapeHtml(CONFIG.name) + ' 🤍</div>' +
      '<div class="letter">' + escapeHtml(CONFIG.letter) + '</div>' +
      '<div class="signoff">— always yours 🤍</div>' +
      '<button class="btn-outline" id="btnRestart" style="margin-top:4px;padding:10px 26px;font-size:14px">read again 🔁</button>' +
    '</div>';
  }

  function template(){
    switch (state.screen){
      case 'greeting': return screenGreeting();
      case 'ready': return screenReady();
      case 'noo': return screenNoo();
      case 'password': return screenPassword();
      case 'reveal': return screenReveal();
      case 'love': return screenLove();
      case 'intro': return screenIntro();
      case 'p1': return screenMemory(0);
      case 'p2': return screenMemory(1);
      case 'p3': return screenMemory(2);
      case 'final': return screenFinal();
      default: return '';
    }
  }

  function bindEvents(){
    var btnNext = host.querySelector('#btnNext');
    if (btnNext) btnNext.addEventListener('click', next);
    var btnYes = host.querySelector('#btnYes');
    if (btnYes) btnYes.addEventListener('click', next);
    var btnNoo = host.querySelector('#btnNoo');
    if (btnNoo) btnNoo.addEventListener('click', function(){ setScreen('noo'); });
    var btnBack = host.querySelector('#btnBack');
    if (btnBack) btnBack.addEventListener('click', function(){ setScreen('ready'); });
    var btnRestart = host.querySelector('#btnRestart');
    if (btnRestart) btnRestart.addEventListener('click', restart);
    var keys = host.querySelectorAll('.key[data-k]');
    keys.forEach(function(k){
      k.addEventListener('click', function(){ pressKey(k.getAttribute('data-k')); });
    });
  }

  function render(){
    host.innerHTML = template();
    bindEvents();
  }

  function setScreen(s){ state.screen = s; render(); }

  function next(){
    var i = FLOW.indexOf(state.screen);
    if (i >= 0 && i < FLOW.length - 1) setScreen(FLOW[i + 1]);
  }

  function restart(){
    state.screen = 'greeting';
    state.pin = '';
    render();
  }

  function updatePasswordDots(){
    var dotsWrap = host.querySelector('.dots');
    if (!dotsWrap) return;
    dotsWrap.classList.toggle('wrong', state.wrong);
    var dots = dotsWrap.querySelectorAll('.dot');
    dots.forEach(function(dot, i){
      dot.classList.toggle('filled', i < state.pin.length);
    });
  }

  function pressKey(d){
    if (d === 'del'){
      state.pin = state.pin.slice(0, -1);
      state.wrong = false;
      updatePasswordDots();
      return;
    }
    if (state.pin.length >= 6) return;
    state.pin += d;
    updatePasswordDots();
    if (state.pin.length === 6){
      var ok = state.pin === CONFIG.password;
      if (ok){
        setTimeout(function(){ state.pin = ''; setScreen('reveal'); }, 380);
      } else {
        state.wrong = true;
        updatePasswordDots();
        setTimeout(function(){ state.pin = ''; state.wrong = false; updatePasswordDots(); }, 650);
      }
    }
  }

  // ---- music ----
  var bgMusic = new Audio('https://res.cloudinary.com/dqpjfkoqy/video/upload/v1782228120/Romantic_Happy_Birthday_Arranged_by_Miranda_Wong_Piano_Cover_yasvfs.mp3');
  bgMusic.loop = true;
  bgMusic.preload = 'auto';

  function updateMusicButton(){
    var btn = document.getElementById('musicBtn');
    var icon = document.getElementById('noteIcon');
    icon.textContent = state.music ? '♪' : '♬';
    btn.classList.toggle('playing', state.music);
  }

  function startMusic(){
    bgMusic.play().catch(function(){});
  }

  function stopMusic(){
    bgMusic.pause();
  }

  function toggleMusic(){
    state.music = !state.music;
    updateMusicButton();
    if (state.music) startMusic(); else stopMusic();
  }

  function autoStartMusic(){
    state.music = true;
    updateMusicButton();
    startMusic();
    function kick(){
      if (state.music && bgMusic.paused) startMusic();
      window.removeEventListener('pointerdown', kick);
      window.removeEventListener('keydown', kick);
      window.removeEventListener('touchstart', kick);
    }
    window.addEventListener('pointerdown', kick);
    window.addEventListener('keydown', kick);
    window.addEventListener('touchstart', kick);
  }

  document.getElementById('musicBtn').addEventListener('click', toggleMusic);

  render();
  autoStartMusic();
})();
</script>
</body>
</html>
